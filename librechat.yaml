version: 1.3.13

memory:
  enabled: false
  
endpoints:
  custom:
    - name: "DeepSeek"
      apiKey: "${DEEPSEEK_API_KEY}"   # Read from environment variable
      baseURL: "https://api.deepseek.com/v1"
      models:
        default:
          - deepseek-v4-pro
          - deepseek-v4-flash
        fetch: false
      titleConvo: true
      titleModel: "deepseek-v4-pro"
      modelDisplayLabel: "DeepSeek V4"
